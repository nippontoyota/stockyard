<!DOCTYPE html>

<html lang="en"><head>

                      "status-out": "#475569", /* Added for specific requirement */
                      "status-flagged": "#d97706" /* Added for specific requirement */

<style>
        body { font-family: 'Open Sans', sans-serif; }
        .camera-overlay::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 2px solid theme('colors.secondary-container');
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            pointer-events: none;
        }
        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid theme('colors.secondary-container');
        }
        .corner-tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .corner-tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .corner-br { bottom: 10px; right: 10px; border-left: none; border-top: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-surface dark:bg-on-background border-b border-outline-variant dark:border-outline flat no shadows flex items-center justify-between px-margin-mobile h-touch-target-min w-full z-50">
<button class="flex items-center justify-center w-12 h-12 text-on-surface-variant dark:text-outline-variant hover:bg-surface-container dark:hover:bg-surface-container-highest active:scale-95 transition-transform rounded-full">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary dark:text-primary-fixed-dim uppercase tracking-tighter">Nippon Yard Scan</h1>
<div class="flex items-center gap-2">
<div class="flex flex-col items-end mr-2">
<span class="font-label-caps text-label-caps text-status-in flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">location_on</span>
                    GPS Locked
                </span>
<span class="font-label-caps text-[10px] text-outline">3 scans pending sync</span>
</div>
<button class="flex items-center justify-center w-12 h-12 text-on-surface-variant dark:text-outline-variant hover:bg-surface-container dark:hover:bg-surface-container-highest active:scale-95 transition-transform rounded-full">
<span class="material-symbols-outlined" data-icon="cloud_off">cloud_off</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 mt-16 px-margin-mobile py-stack-md flex flex-col gap-stack-lg max-w-2xl mx-auto w-full">
<!-- Mode Toggle -->
<div class="flex bg-surface-container-highest rounded p-1 w-full border border-outline-variant">
<button class="flex-1 font-headline-md text-headline-md py-3 rounded text-on-primary bg-primary border-2 border-primary shadow-sm" id="btn-mode-in">IN</button>
<button class="flex-1 font-headline-md text-headline-md py-3 rounded text-on-surface-variant bg-transparent border-2 border-transparent" id="btn-mode-out">OUT</button>
</div>
<!-- Camera Area -->
<div class="relative w-full h-[350px] bg-black rounded-xl overflow-hidden border border-outline-variant">
<!-- Simulated Camera Feed -->
<img alt="Camera Feed" class="w-full h-full object-cover opacity-80" data-alt="A rugged, industrial stockyard setting. Blurred out vehicles and concrete barriers in the background, seen through a camera viewfinder. High contrast, bright daylight, realistic texture." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC2HDxLmTmaSBvyv6ZxrPx-pQkQ3EQs9B0zC9Hnyo-SCKle6AQ0OMahk08zUT9yS4tz8kfE3LMXAx6ReqgBT9fi-c8frufjT1eZ2Gh7sLe1XqbuOVvlOZulkD5FK5IWKDzrIapHrMLSiSK_lX2zXHFMYN9uunbTcrqO4pMuBHBB6nkY3puwl0oU2lXL6gZrjydqgYfR3FummZsJNjT5YlHq7seyFvws6Ucf6G_0gKOMADBqB5xcwsLz2JJcdcmvB-59Z3Yb6FfBDwS5"/>
<div class="absolute inset-0 camera-overlay flex items-center justify-center">
<div class="relative w-[250px] h-[250px]">
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="absolute inset-0 flex items-center justify-center">
<span class="text-white font-label-caps text-label-caps bg-black/50 px-2 py-1 rounded">ALIGN QR/BARCODE</span>
</div>
</div>
</div>
<!-- Scan Action FAB (Contextual) -->
<button class="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-secondary-container text-on-secondary-container rounded-full px-6 py-4 flex items-center gap-2 font-headline-md text-headline-md shadow-lg border-2 border-secondary-container active:scale-95 transition-transform w-full max-w-[12rem] justify-center">
<span class="material-symbols-outlined font-bold">barcode_scanner</span>
                SCAN
            </button>
</div>
<!-- Manual Entry Fallback -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-stack-md flex flex-col gap-stack-sm">
<label class="font-body-md text-body-md text-on-surface-variant" for="vin-input">Manual VIN Entry</label>
<div class="flex gap-2">
<input class="flex-1 bg-surface-bright border border-outline-variant rounded-md px-4 py-3 font-data-mono text-data-mono text-on-surface focus:border-primary focus:ring-1 focus:ring-primary h-touch-target-min uppercase" id="vin-input" placeholder="Enter VIN manually" type="text"/>
<button class="bg-primary-container text-on-primary-container px-6 rounded-md font-headline-md text-headline-md border border-primary-container hover:bg-surface-tint hover:text-white transition-colors h-touch-target-min">Submit</button>
</div>
</div>
<!-- OUT Mode Specific Fields (Hidden by default, shown via JS) -->
<div class="hidden flex-col gap-stack-lg animate-fade-in" id="out-mode-fields">
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-stack-md flex flex-col gap-stack-sm">
<label class="font-body-md text-body-md text-on-surface-variant" for="out-remark">OUT Remark</label>
<select class="w-full bg-surface-bright border border-outline-variant rounded-md px-4 py-3 font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary h-touch-target-min" id="out-remark">
<option disabled="" selected="" value="">Select Remark</option>
<option value="customer_acquisition">Customer Acquisition</option>
<option value="stockyard_transfer">Stockyard Transfer</option>
</select>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-stack-md flex flex-col gap-stack-sm">
<div class="flex items-center gap-3 mb-2">
<input class="w-6 h-6 border-outline-variant rounded text-error focus:ring-error" id="damage-flag" type="checkbox"/>
<label class="font-headline-md text-headline-md text-on-surface" for="damage-flag">Report Damage</label>
</div>
<textarea class="w-full bg-surface-bright border border-outline-variant rounded-md px-4 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary hidden" id="damage-details" placeholder="Describe damage details..." rows="3"></textarea>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 bg-surface dark:bg-on-background border-t border-outline-variant dark:border-outline flat no shadows flex justify-around items-center h-16 px-2">
<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary rounded-full px-4 py-2 hover:bg-surface-container-low dark:hover:bg-surface-container-highest active:scale-90 transition-all flex-1" href="#">
<span class="material-symbols-outlined" data-icon="barcode_scanner" data-weight="fill">barcode_scanner</span>
<span class="font-label-caps text-label-caps mt-1">Scan</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-2 hover:bg-surface-container-low dark:hover:bg-surface-container-highest active:scale-90 transition-all flex-1" href="#">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-label-caps text-label-caps mt-1">Stock</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-2 hover:bg-surface-container-low dark:hover:bg-surface-container-highest active:scale-90 transition-all flex-1" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label-caps text-label-caps mt-1">History</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-2 hover:bg-surface-container-low dark:hover:bg-surface-container-highest active:scale-90 transition-all flex-1" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-caps text-label-caps mt-1">Profile</span>
</a>
</nav>
<!-- Navigation Drawer (Desktop Only - Hidden on Mobile) -->
<aside class="hidden md:flex fixed inset-y-0 left-0 z-[60] flex-col py-stack-lg bg-surface-container-low dark:bg-on-background border-r border-outline-variant dark:border-outline flat no shadows h-full w-72 rounded-r-full">
<div class="px-6 mb-8">
<h2 class="font-headline-md text-headline-md text-on-surface">Admin Console</h2>
</div>
<nav class="flex flex-col gap-2">
<a class="text-on-surface-variant dark:text-outline-variant mx-2 px-4 py-3 hover:bg-surface-variant dark:hover:bg-surface-container-highest active:opacity-80 transition-opacity flex items-center gap-4 rounded-full min-h-[48px]" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-body-md text-body-md">Dashboard</span>
</a>
<a class="bg-primary-container text-on-primary-container font-bold rounded-full mx-2 px-4 py-3 hover:bg-surface-variant dark:hover:bg-surface-container-highest active:opacity-80 transition-opacity flex items-center gap-4 min-h-[48px]" href="#">
<span class="material-symbols-outlined" data-icon="barcode_scanner" data-weight="fill">barcode_scanner</span>
<span class="font-body-md text-body-md">Scan</span>
</a>
<a class="text-on-surface-variant dark:text-outline-variant mx-2 px-4 py-3 hover:bg-surface-variant dark:hover:bg-surface-container-highest active:opacity-80 transition-opacity flex items-center gap-4 rounded-full min-h-[48px]" href="#">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-body-md text-body-md">Yard Map</span>
</a>
<a class="text-on-surface-variant dark:text-outline-variant mx-2 px-4 py-3 hover:bg-surface-variant dark:hover:bg-surface-container-highest active:opacity-80 transition-opacity flex items-center gap-4 rounded-full min-h-[48px]" href="#">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-body-md text-body-md">Staff Management</span>
</a>
<a class="text-on-surface-variant dark:text-outline-variant mx-2 px-4 py-3 hover:bg-surface-variant dark:hover:bg-surface-container-highest active:opacity-80 transition-opacity flex items-center gap-4 rounded-full min-h-[48px]" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-body-md text-body-md">Settings</span>
</a>
</nav>
</aside>
<script>
        // Simple Interaction Logic
        const btnIn = document.getElementById('btn-mode-in');
        const btnOut = document.getElementById('btn-mode-out');
        const outFields = document.getElementById('out-mode-fields');
        const damageFlag = document.getElementById('damage-flag');
        const damageDetails = document.getElementById('damage-details');

        btnIn.addEventListener('click', () => {
            btnIn.classList.add('bg-primary', 'text-on-primary', 'border-primary', 'shadow-sm');
            btnIn.classList.remove('bg-transparent', 'text-on-surface-variant', 'border-transparent');
            
            btnOut.classList.remove('bg-status-out', 'text-white', 'border-status-out', 'shadow-sm');
            btnOut.classList.add('bg-transparent', 'text-on-surface-variant', 'border-transparent');
            
            outFields.classList.add('hidden');
            outFields.classList.remove('flex');
        });

        btnOut.addEventListener('click', () => {
            btnOut.classList.add('bg-status-out', 'text-white', 'border-status-out', 'shadow-sm');
            btnOut.classList.remove('bg-transparent', 'text-on-surface-variant', 'border-transparent');
            
            btnIn.classList.remove('bg-primary', 'text-on-primary', 'border-primary', 'shadow-sm');
            btnIn.classList.add('bg-transparent', 'text-on-surface-variant', 'border-transparent');
            
            outFields.classList.remove('hidden');
            outFields.classList.add('flex');
        });

        damageFlag.addEventListener('change', (e) => {
            if(e.target.checked) {
                damageDetails.classList.remove('hidden');
            } else {
                damageDetails.classList.add('hidden');
            }
        });
    </script>
</body></html>
