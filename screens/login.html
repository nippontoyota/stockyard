<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Nippon Yard Scan - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#001b3d",
                        "inverse-on-surface": "#eaf1ff",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#2e476f",
                        "primary-fixed": "#d6e3ff",
                        "tertiary": "#321c00",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "error-container": "#ffdad6",
                        "surface-bright": "#f8f9ff",
                        "primary": "#002046",
                        "primary-fixed-dim": "#aec7f7",
                        "outline": "#74777f",
                        "surface-container": "#e5eeff",
                        "inverse-primary": "#aec7f7",
                        "surface-variant": "#d3e4fe",
                        "on-primary-container": "#87a0cd",
                        "tertiary-fixed-dim": "#f1bd81",
                        "on-error-container": "#93000a",
                        "on-surface": "#0b1c30",
                        "secondary": "#9d4300",
                        "on-secondary-container": "#5c2400",
                        "tertiary-container": "#4f2f00",
                        "surface-container-highest": "#d3e4fe",
                        "surface": "#f8f9ff",
                        "on-background": "#0b1c30",
                        "secondary-container": "#fd761a",
                        "outline-variant": "#c4c6cf",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#2b1700",
                        "on-error": "#ffffff",
                        "surface-dim": "#cbdbf5",
                        "on-tertiary-fixed-variant": "#623f0f",
                        "tertiary-fixed": "#ffddb9",
                        "background": "#f8f9ff",
                        "on-tertiary-container": "#c6965e",
                        "primary-container": "#1b365d",
                        "surface-container-low": "#eff4ff",
                        "on-surface-variant": "#44474e",
                        "inverse-surface": "#213145",
                        "on-secondary-fixed-variant": "#783200",
                        "surface-tint": "#465f88",
                        "secondary-fixed": "#ffdbca",
                        "secondary-fixed-dim": "#ffb690",
                        "on-secondary-fixed": "#341100"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "stack-lg": "24px",
                        "gutter": "12px",
                        "stack-sm": "8px",
                        "touch-target-min": "48px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Open Sans"],
                        "label-caps": ["Open Sans"],
                        "body-lg": ["Open Sans"],
                        "headline-md": ["Open Sans"],
                        "headline-lg-mobile": ["Open Sans"],
                        "data-mono": ["Open Sans"],
                        "headline-lg": ["Open Sans"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "26px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "data-mono": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
        }

        /* Custom styles for industrial input focus */
        .industrial-input:focus {
            outline: none;
            border: 2px solid #002046;
            /* primary */
            box-shadow: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-surface text-on-surface h-screen w-full flex flex-col overflow-hidden font-body-md">
    <!-- Main Content Canvas (Login/Transactional, so Nav Shell is suppressed) -->
    <main class="flex-1 flex flex-col px-margin-mobile pt-12 pb-8 h-full w-full max-w-md mx-auto">
        <!-- Brand Header -->
        <header class="flex flex-col items-center justify-center mb-stack-lg mt-8">
            <div class="w-24 h-24 bg-primary rounded-full flex items-center justify-center mb-stack-md shadow-sm">
                <span class="material-symbols-outlined text-on-primary"
                    style="font-size: 48px; font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
            </div>
            <h1
                class="font-headline-lg-mobile text-headline-lg-mobile text-primary uppercase tracking-tighter text-center">
                Nippon Yard Scan
            </h1>
            <p class="font-body-md text-body-md text-on-surface-variant mt-2 text-center">
                Logistics &amp; Inventory Control
            </p>
        </header>
        <!-- Login Form Container (Surface Card) -->
        <div
            class="bg-surface-container-lowest border border-outline-variant rounded-lg p-stack-lg shadow-sm flex-1 flex flex-col justify-center">
            <form class="flex flex-col gap-stack-lg" id="login-form"
                onsubmit="event.preventDefault(); window.location.href='#';">
                <!-- Input Group: Yard Code / Admin ID -->
                <div class="flex flex-col gap-stack-sm">
                    <label class="font-label-caps text-label-caps text-on-surface uppercase" for="yard-code">Yard Code /
                        Admin ID</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                            <span class="material-symbols-outlined text-outline">badge</span>
                        </span>
                        <input
                            class="industrial-input w-full h-touch-target-min pl-10 pr-3 py-3 bg-surface border border-outline-variant rounded text-body-lg font-body-lg text-on-surface placeholder-outline-variant transition-colors"
                            id="yard-code" name="yard-code" placeholder="e.g. YARD-001" required="" type="text" />
                    </div>
                </div>
                <!-- Input Group: Access Key -->
                <div class="flex flex-col gap-stack-sm">
                    <label class="font-label-caps text-label-caps text-on-surface uppercase" for="access-key">Access
                        Key</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                            <span class="material-symbols-outlined text-outline">key</span>
                        </span>
                        <input
                            class="industrial-input w-full h-touch-target-min pl-10 pr-10 py-3 bg-surface border border-outline-variant rounded text-body-lg font-body-lg text-on-surface placeholder-outline-variant transition-colors"
                            id="access-key" name="access-key" placeholder="••••••••" required="" type="password" />
                        <button class="absolute inset-y-0 right-0 flex items-center pr-3"
                            onclick="togglePasswordVisibility()" type="button">
                            <span class="material-symbols-outlined text-outline active:text-primary transition-colors"
                                id="visibility-icon">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Action Button -->
                <div class="mt-stack-md">
                    <button
                        class="w-full h-touch-target-min bg-secondary-container hover:bg-secondary text-on-secondary-container font-headline-md text-headline-md rounded flex items-center justify-center gap-2 active:scale-95 transition-all shadow-sm border border-secondary-container"
                        type="submit">
                        <span>LOGIN TO SYSTEM</span>
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">login</span>
                    </button>
                </div>
            </form>
            <!-- Secondary Actions -->
            <div
                class="mt-stack-lg pt-stack-lg border-t border-outline-variant flex flex-col gap-stack-md items-center">
                <button
                    class="h-touch-target-min w-full flex items-center justify-center text-primary font-body-md text-body-md border border-primary rounded hover:bg-surface-container active:scale-95 transition-all"
                    type="button">
                    Request Temporary Access
                </button>
                <div class="flex items-center gap-2 text-on-surface-variant font-label-caps text-label-caps mt-2">
                    <span class="material-symbols-outlined" style="font-size: 16px;">wifi_tethering</span>
                    <span>System Status: Online</span>
                </div>
            </div>
        </div>
        <!-- Footer Versioning -->
        <footer class="mt-auto pt-8 text-center">
            <p class="font-data-mono text-data-mono text-outline">v2.4.1 (Build 890)</p>
        </footer>
    </main>
    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('access-key');
            const visibilityIcon = document.getElementById('visibility-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility';
            }
        }
    </script>
</body>

</html>
